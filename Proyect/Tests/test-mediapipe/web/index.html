<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe Pose - Colores por Extremidad</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustes adicionales inline */
        .mdc-button {
            height: 30px !important;
            min-width: 100px !important;
            font-size: 12px !important;
            padding: 0 8px !important;
        }
        /* Ocultar posibles scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <!-- <h1>Detección de Pose con Colores</h1> -->
    <section id="demos">
        <div id="liveView" class="videoView">
            <button id="webcamButton" class="mdc-button mdc-button--raised">
                <span class="mdc-button__ripple"></span>
                <span class="mdc-button__label">WEBCAM</span> <!-- Texto más corto -->
            </button>
            <div style="position: relative; width: 640px; height: 360px;">
                <video id="webcam" autoplay playsinline></video>
                <canvas class="output_canvas" id="output_canvas"></canvas>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
    <!-- <script type="module" src="script-tests.js"></script> -->
    <script type="module" src="script.js"></script>
</body>
</html>
