<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe Pose - Colores por Extremidad</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustes adicionales inline */
        .mdc-button {
            height: 30px !important;
            max-width: 40% !important;
            font-size: 12px !important;
            padding: 0 8px !important;
        }
        /* Ocultar posibles scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        #liveView {
            display: flex;
            justify-content: center;
        }

        .videoView {
            position: relative;
            width: 640px;
            height: 360px;
        }

        /* VIDEO Y CANVAS */
        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* BOTÓN CENTRADO SOBRE EL CANVAS */
        #webcamButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            background-color: #0093a1;
            color: white;
            border: none;
            border-radius: 20px;
            
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            
            z-index: 10;
            transition: 0.2s ease;

            width: 30%;
        }

        /* Hover opcional */
        #webcamButton:hover {
            background-color: #007c87;
        }
    </style>
</head>
<body>
    <!-- <h1>Detección de Pose con Colores</h1> -->
    <section id="demos">
        <div id="liveView" class="videoView">
            <button id="webcamButton"><b>Iniciar Captura</b></button>
            <div style="position: relative; width: 640px; height: 360px;">
                <video id="webcam" autoplay playsinline></video>
                <canvas class="output_canvas" id="output_canvas"></canvas>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
    <!-- <script type="module" src="script-tests.js"></script> -->
    <script type="module" src="script.js"></script>
</body>
</html>
