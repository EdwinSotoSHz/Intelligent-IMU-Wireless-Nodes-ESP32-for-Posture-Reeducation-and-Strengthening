<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MPU 3D - NodeRED Control</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

.axis-label{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.8);
color:white;
padding:10px;
border-radius:10px;
font-size:22px;
}

.axis-color{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;}
.blue-bg{background:#ff3333;}
.green-bg{background:#00cc00;}
.red-bg{background:#0066ff;}

.roll-color{color:#ff3333;font-weight:bold;}
.pitch-color{color:#00cc00;font-weight:bold;}
.yaw-color{color:#0066ff;font-weight:bold;}
</style>
</head>

<body>

<div class="axis-label">
<div><span class="axis-color blue-bg"></span><span class="roll-color">Roll (X)</span></div>
<div><span class="axis-color green-bg"></span><span class="pitch-color">Pitch (Y)</span></div>
<div><span class="axis-color red-bg"></span><span class="yaw-color">Yaw (Z)</span></div>
</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.150.0/build/three.module.js"
}
}
</script>

<script type="module">

import * as THREE from 'three';

// ============================
// VARIABLES CONTROLADAS
// ============================

let rollF=0,pitchF=0,yawF=0;
let rollA=0,pitchA=0,yawA=0;


// ============================
// ESCENA THREEJS
// ============================

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x111111);

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(1,1,4);
camera.lookAt(1,0,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x606060));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7.5);
scene.add(light);

scene.add(new THREE.GridHelper(20,40,0x333333,0x222222));
scene.add(new THREE.AxesHelper(2).setColors(0x00ff00,0x0000ff,0xff0000));

const width=2,height=0.5,depth=1;


// ============================
// CUBO PADRE
// ============================

const geo1=new THREE.BoxGeometry(width,height,depth);
geo1.translate(width/2,0,0);

const mat1=new THREE.MeshStandardMaterial({
color:0x00ffcc,
transparent:true,
opacity:0.9
});

const cube1=new THREE.Mesh(geo1,mat1);
scene.add(cube1);


// ============================
// CUBO HIJO
// ============================

const geo2=new THREE.BoxGeometry(width,height,depth);
geo2.translate(width/2,0,0);

const mat2=new THREE.MeshStandardMaterial({
color:0xffcc00,
transparent:true,
opacity:0.9
});

const cube2=new THREE.Mesh(geo2,mat2);
cube2.position.x=width;
cube1.add(cube2);


// ============================
// MARCADORES
// ============================

scene.add(new THREE.Mesh(
new THREE.SphereGeometry(0.05),
new THREE.MeshBasicMaterial({color:0xff0000})
));

const marker2=new THREE.Mesh(
new THREE.SphereGeometry(0.05),
new THREE.MeshBasicMaterial({color:0xffffff})
);

cube2.add(marker2);


// ============================
// WEBSOCKET NODE-RED
// ============================

const socket=new WebSocket("ws://localhost:1880/imu");

socket.onmessage=(event)=>{

const data=JSON.parse(event.data);
rollA=data.rollA;
pitchA=data.pitchA;
yawA=data.yawA;

rollF=data.rollF;
pitchF=data.pitchF;
yawF=data.yawF;
};


// ============================
// ANIMACION
// ============================

function animate(){

requestAnimationFrame(animate);

// Padre
cube1.rotation.x=pitchA*Math.PI/180;
cube1.rotation.y=yawA*Math.PI/180;
cube1.rotation.z=rollA*Math.PI/180;

// Hijo
cube2.rotation.x=pitchF*Math.PI/180;
cube2.rotation.y=yawF*Math.PI/180;
cube2.rotation.z=rollF*Math.PI/180;

renderer.render(scene,camera);

}

animate();


window.addEventListener('resize',()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
