<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MPU 3D - Dual Control</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            pointer-events: none; /* Permite clickear la escena si es necesario */
        }
        .control-panel {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            pointer-events: auto;
            min-width: 250px;
        }
        .slider-container { margin: 10px 0; }
        .slider-container label { display: inline-block; width: 50px; }
        .slider-container input { width: 150px; margin: 0 10px; }
        .slider-container span { display: inline-block; width: 40px; text-align: right; }
        
        .legend {
            margin-top: 10px;
            font-size: 0.8em;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .x { color: #ff4444; } .y { color: #44ff44; } .z { color: #4444ff; }
        h4 { margin: 0 0 10px 0; color: #00ffcc; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="control-panel">
            <h4>Cubo Izquierdo (1)</h4>
            <div class="slider-container">
                <label>Roll:</label>
                <input type="range" id="roll1" min="-180" max="180" value="0">
                <span id="roll1-val">0°</span>
            </div>
            <div class="slider-container">
                <label>Pitch:</label>
                <input type="range" id="pitch1" min="-180" max="180" value="0">
                <span id="pitch1-val">0°</span>
            </div>
            <div class="slider-container">
                <label>Yaw:</label>
                <input type="range" id="yaw1" min="-180" max="180" value="0">
                <span id="yaw1-val">0°</span>
            </div>
        </div>

        <div class="control-panel">
            <h4>Cubo Derecho (2)</h4>
            <div class="slider-container">
                <label>Roll:</label>
                <input type="range" id="roll2" min="-180" max="180" value="0">
                <span id="roll2-val">0°</span>
            </div>
            <div class="slider-container">
                <label>Pitch:</label>
                <input type="range" id="pitch2" min="-180" max="180" value="0">
                <span id="pitch2-val">0°</span>
            </div>
            <div class="slider-container">
                <label>Yaw:</label>
                <input type="range" id="yaw2" min="-180" max="180" value="0">
                <span id="yaw2-val">0°</span>
            </div>
            <div class="legend">
                Ejes: <span class="x">X</span> | <span class="y">Y</span> | <span class="z">Z</span>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 8); 
        camera.lookAt(4, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);

        scene.add(new THREE.GridHelper(20, 40, 0x444444, 0x222222));
        scene.add(new THREE.AxesHelper(5));

        // --- CONFIGURACIÓN DE LOS CUBOS ---
        const width = 3, height = 0.5, depth = 1;

        function createPivotedCube(color, posX) {
            const geo = new THREE.BoxGeometry(width, height, depth);
            // Movemos la geometría para que el pivote esté en la cara izquierda
            geo.translate(width / 2, 0, 0);
            
            const mat = new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.x = posX;
            scene.add(mesh);

            // Marcador de pivote
            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(0.1),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            marker.position.x = posX;
            scene.add(marker);

            return mesh;
        }

        const cube1 = createPivotedCube(0x00ffcc, 0);   // Cubo en el origen
        const cube2 = createPivotedCube(0xffcc00, 3.5); // Cubo a la derecha (separado 3.5 unidades)

        // --- LÓGICA DE CONTROL ---
        function setupControls(id, cube) {
            const rS = document.getElementById('roll' + id);
            const pS = document.getElementById('pitch' + id);
            const yS = document.getElementById('yaw' + id);
            const rV = document.getElementById('roll' + id + '-val');
            const pV = document.getElementById('pitch' + id + '-val');
            const yV = document.getElementById('yaw' + id + '-val');

            const update = () => {
                const r = parseFloat(rS.value) * Math.PI / 180;
                const p = parseFloat(pS.value) * Math.PI / 180;
                const y = parseFloat(yS.value) * Math.PI / 180;

                cube.rotation.set(p, -y, -r);

                rV.textContent = rS.value + '°';
                pV.textContent = pS.value + '°';
                yV.textContent = yS.value + '°';
            };

            [rS, pS, yS].forEach(s => s.addEventListener('input', update));
            update();
        }

        setupControls('1', cube1);
        setupControls('2', cube2);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
