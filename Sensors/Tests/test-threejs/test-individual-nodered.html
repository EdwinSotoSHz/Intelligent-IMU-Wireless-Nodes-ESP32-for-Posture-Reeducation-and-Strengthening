<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MPU 3D - NodeRED Control</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#info{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.8);
color:white;
padding:15px;
border-radius:10px;
z-index:100;
}
</style>
</head>

<body>

<div id="info">
<h3>Orientación IMU</h3>
<div>Roll: <span id="roll">0</span>°</div>
<div>Pitch: <span id="pitch">0</span>°</div>
<div>Yaw: <span id="yaw">0</span>°</div>
</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.150.0/build/three.module.js"
}
}
</script>

<script type="module">

import * as THREE from "three";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(3,2,5);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(1,2,3);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

const gridHelper = new THREE.GridHelper(10,20,0x444444,0x222222);
scene.add(gridHelper);

const geometry = new THREE.BoxGeometry(3,0.5,1);
const material = new THREE.MeshStandardMaterial({color:0x00ffcc});
const cube = new THREE.Mesh(geometry,material);

scene.add(cube);

const rollText=document.getElementById("roll");
const pitchText=document.getElementById("pitch");
const yawText=document.getElementById("yaw");

function setRotation(roll,pitch,yaw){

cube.rotation.x = pitch*Math.PI/180;
cube.rotation.y = -yaw*Math.PI/180;
cube.rotation.z = -roll*Math.PI/180;

rollText.textContent = roll.toFixed(1);
pitchText.textContent = pitch.toFixed(1);
yawText.textContent = yaw.toFixed(1);

}

/* -------------------------
WEBSOCKET NODE-RED
------------------------- */

const socket = new WebSocket("ws://localhost:1880/mpu");

socket.onopen=()=>{
console.log("WS conectado");
};

socket.onmessage=(event)=>{

const data = JSON.parse(event.data);

setRotation(
data.roll,
data.pitch,
data.yaw
);

};

socket.onerror=(err)=>{
console.log("WS error",err);
};

/* -------------------------
RENDER LOOP
------------------------- */

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
