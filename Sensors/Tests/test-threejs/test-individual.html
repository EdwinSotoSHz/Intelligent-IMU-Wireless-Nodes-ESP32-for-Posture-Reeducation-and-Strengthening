<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MPU 3D - Pivote en Eje Y</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-container label {
            display: inline-block;
            width: 50px;
        }
        .slider-container input {
            width: 200px;
            margin: 0 10px;
        }
        .slider-container span {
            display: inline-block;
            width: 40px;
            text-align: right;
        }
        .legend {
            margin-top: 10px;
            font-size: 0.8em;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .x { color: #ff4444; }
        .y { color: #44ff44; }
        .z { color: #4444ff; }
    </style>
</head>
<body>
    <div id="info">
        <h3>Pivote en Cara Izquierda</h3>
        <p style="font-size: 0.8em; color: #aaa;">El objeto inicia en el lado derecho del Eje Y.</p>
        <div class="slider-container">
            <label>Roll:</label>
            <input type="range" id="roll" min="-180" max="180" value="0" step="1">
            <span id="roll-value">0°</span>
        </div>
        <div class="slider-container">
            <label>Pitch:</label>
            <input type="range" id="pitch" min="-180" max="180" value="0" step="1">
            <span id="pitch-value">0°</span>
        </div>
        <div class="slider-container">
            <label>Yaw:</label>
            <input type="range" id="yaw" min="-180" max="180" value="0" step="1">
            <span id="yaw-value">0°</span>
        </div>
        <div class="legend">
            Ejes: <span class="x">X (Rojo)</span> | <span class="y">Y (Verde)</span> | <span class="z">Z (Azul)</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 6); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        const gridHelper = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(5);
        scene.add(axesHelper);

        // --- LÓGICA DE POSICIONAMIENTO ---
        const width = 3;
        const height = 0.5;
        const depth = 1;

        const geometry = new THREE.BoxGeometry(width, height, depth);
        
        // Desplazamos los vértices para que el origen (0,0,0) esté en la cara izquierda
        geometry.translate(width / 2, 0, 0);

        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, 
            transparent: true, 
            opacity: 0.8
        });

        const cube = new THREE.Mesh(geometry, material);

        // Al dejar la posición en X = 0, el "origen" del cubo (su cara izquierda)
        // se queda exactamente sobre el eje Y (línea verde).
        cube.position.set(0, 0, 0); 

        scene.add(cube);
        // ---------------------------------

        // Marcador del pivote (Punto rojo en el origen para referencia)
        const pivotMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.1),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        scene.add(pivotMarker);

        const rollSlider = document.getElementById('roll');
        const pitchSlider = document.getElementById('pitch');
        const yawSlider = document.getElementById('yaw');
        const rollSpan = document.getElementById('roll-value');
        const pitchSpan = document.getElementById('pitch-value');
        const yawSpan = document.getElementById('yaw-value');

        function updateRotation() {
            const roll = parseFloat(rollSlider.value) * Math.PI / 180;
            const pitch = parseFloat(pitchSlider.value) * Math.PI / 180;
            const yaw = parseFloat(yawSlider.value) * Math.PI / 180;

            // Rotación sobre el pivote configurado
            cube.rotation.x = pitch;
            cube.rotation.y = -yaw;
            cube.rotation.z = -roll;

            rollSpan.textContent = rollSlider.value + '°';
            pitchSpan.textContent = pitchSlider.value + '°';
            yawSpan.textContent = yawSlider.value + '°';
        }

        rollSlider.addEventListener('input', updateRotation);
        pitchSlider.addEventListener('input', updateRotation);
        yawSlider.addEventListener('input', updateRotation);
        
        updateRotation();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
